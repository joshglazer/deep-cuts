version: 1
backend:
  phases:
    build:
      commands:
        - npm install
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        # Amplify Hosting only exposes console-configured env vars to the
        # build step by default, not to the deployed Next.js server runtime
        # (route handlers, server actions, middleware) — writing them into
        # .env.production is the documented way to bridge that gap:
        # https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
        - env | grep -e AUTH_SECRET -e AUTH_SPOTIFY_ID -e AUTH_SPOTIFY_SECRET -e AUTH_URL >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
