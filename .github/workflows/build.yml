name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # src/lib/amplify-server.ts statically imports amplify_outputs.json,
      # which is git-ignored and only ever generated by `ampx sandbox` /
      # `ampx pipeline-deploy` against a real AWS backend (see CLAUDE.md,
      # "Previewing in a git worktree"). CI has no backend to deploy and
      # shouldn't provision one just to type-check a build, so this writes a
      # placeholder with the shape Amplify.configure()/generateClient()
      # expect. The app's list/auth pages are all dynamically rendered (no
      # generateStaticParams/force-static), so `next build` never actually
      # calls out to this fake endpoint — it only needs the file to resolve.
      - name: Write placeholder amplify_outputs.json
        run: |
          cat > amplify_outputs.json <<'EOF'
          {
            "data": {
              "url": "https://ci-placeholder.appsync-api.us-east-1.amazonaws.com/graphql",
              "aws_region": "us-east-1",
              "default_authorization_type": "API_KEY",
              "api_key": "da2-ci-placeholder",
              "authorization_types": []
            },
            "version": "1"
          }
          EOF

      # amplify/functions/poll-spotify/handler.ts imports "$amplify/env/poll-spotify"
      # (mapped via tsconfig.json's paths), which Amplify only generates as
      # part of an `ampx sandbox`/`ampx pipeline-deploy` run against a real
      # backend. `next build` type-checks this file too (it's within
      # tsconfig's include globs), so it needs to resolve even though the
      # Next app itself never imports it. Only the shape matters here — see
      # DataClientEnv in @aws-amplify/backend-function's
      # get_amplify_clients_configuration.d.ts — the handler never runs in CI.
      - name: Write placeholder Amplify function env module
        run: |
          mkdir -p .amplify/generated/env
          cat > .amplify/generated/env/poll-spotify.ts <<'EOF'
          export const env = {
            AWS_ACCESS_KEY_ID: "",
            AWS_SECRET_ACCESS_KEY: "",
            AWS_SESSION_TOKEN: "",
            AWS_REGION: "us-east-1",
            AMPLIFY_DATA_DEFAULT_NAME: "",
          };
          EOF

      - name: Build
        env:
          # Placeholder values so Auth.js's config (src/auth.ts) has
          # something to read at module-eval time during the build — none of
          # these need to be real since the build never signs anyone in.
          AUTH_SPOTIFY_ID: ci-placeholder
          AUTH_SPOTIFY_SECRET: ci-placeholder
          AUTH_SECRET: ci-placeholder-secret-value-not-used-in-production
          AUTH_URL: http://127.0.0.1:3000
        run: npm run build
